services:
  - type: web
    name: your-django-app
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn your_project.wsgi:application
    envVars:
      - key: SECRET_KEY
        value: 
      - key: DEBUG
        value: false   